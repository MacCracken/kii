name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # release.yml gates on this workflow via `uses: ./.github/workflows/ci.yml`.
  # GitHub Actions requires the called workflow to opt in via `workflow_call:`
  # — without this, the v0.2.0 release tag would trip on the CI-gate step.
  # Wired in at v0.2.0 close-out (see CHANGELOG). A more thorough CI/release
  # pass (fuzz step, --version smoke, aarch64 cross, CHANGELOG-extracted
  # release notes) is captured in the v0.2.0 release notes and pending a
  # dedicated cycle.
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep 'cyrius *= *"' cyrius.cyml 2>/dev/null | head -1 | sed 's/.*"\(.*\)"/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve dependencies
        run: cyrius deps

      - name: Build
        # Binary name is `kii` per cyrius.cyml [build].output, NOT the
        # GitHub repo name (`cyrius-kii`). The cyrius-init template
        # used ${{ github.event.repository.name }} as a default; kii's
        # repo and binary names diverge, so hardcode the binary.
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/kii

      - name: Version drift check
        # The print_version literal in src/main.cyr is hand-edited at
        # each milestone close. This step catches the class of drift
        # where VERSION bumps but the literal doesn't (or vice versa)
        # — locally hit once during the M1 close-out cycle. Compares
        # the binary's `--version` first line against the VERSION
        # file. Auto-generated literals are a v0.3.x follow-up
        # (sibling pattern: anuenue's scripts/version-bump.sh).
        run: |
          EXPECTED="kii $(cat VERSION | tr -d '[:space:]')"
          ACTUAL=$(./build/kii --version | head -1)
          test "$ACTUAL" = "$EXPECTED" || { echo "version drift: binary says '$ACTUAL', VERSION says '$EXPECTED'"; exit 1; }

      - name: Test
        # v5.6.28: bare `cyrius test` picks up the [build].test entry
        # AND auto-discovers tests/*.tcyr — avoids the previous
        # `cyrius test src/test.cyr` form that hard-failed when the
        # stub didn't exist (Issue 1) and also wouldn't ever exercise
        # tests/${proj}.tcyr.
        run: cyrius test

      - name: Fuzz (arg-parser crash-safety)
        # tests/kii.fcyr wires a deterministic LCG-driven loop over
        # kii's flag set. 10k iters runs in ~0.04 s — basically free
        # in CI. M7 audit cycle raises iter count to 10⁶ per the
        # v1.0 acceptance criterion. PNG-decoder fuzz lands as a
        # separate harness at M2.
        run: |
          cyrius build tests/kii.fcyr build/kii-fuzz
          ./build/kii-fuzz
